# Datasources configuration for Grafana
apiVersion: 1

datasources:
  # Prometheus datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"

  # Loki datasource for logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - name: "trace_id"
          matcherRegex: "trace_id=([A-Za-z0-9-]+)"
          url: "$${__value}"
          datasourceUid: "loki"