services:
  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: sibsiu-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\n\r\n' >&3;if [ $? -eq 0 ];then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - sibsiu-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sibsiu-postgres
    environment:
      POSTGRES_DB: sibsiu_canteen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sibsiu_canteen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sibsiu-network

  # Prometheus - метрики и мониторинг
  prometheus:
    image: prom/prometheus:latest
    container_name: sibsiu-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - sibsiu-network
    restart: unless-stopped

  # Grafana - визуализация метрик
  grafana:
    image: grafana/grafana:latest
    container_name: sibsiu-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sibsiu-network
    restart: unless-stopped

  # Loki - логирование
  loki:
    image: grafana/loki:latest
    container_name: sibsiu-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sibsiu-network
    restart: unless-stopped

  # Promtail - агент для отправки логов в Loki
  promtail:
    image: grafana/promtail:latest
    container_name: sibsiu-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - sibsiu-network
    restart: unless-stopped

 # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sibsiu-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:1@sibsiu-postgres:5432/sibsiu_canteen?schema=public
      PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
      KEYCLOAK_SERVER_URL: http://sibsiu-keycloak:8080
      SERVER_KEYCLOAK_CLIENT_SECRET: Nq8l2hgmjEnmB7OoNiygbWbOm8zRHsPd
      # URL для браузера (Keycloak перенаправит сюда после входа)
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: canteen
      VITE_KEYCLOAK_CLIENT_ID: canteen-web
      # Теперь заходим через 3001, чтобы не мешать Grafana
      VITE_APP_URL: http://localhost:3001
      VITE_PAYMENT_URL: https://pay.sibsiu.ru/
      # Важно: заставляем сервер слушать все интерфейсы внутри контейнера
      PORT: 5173
      HOST: 0.0.0.0 
    ports:
      - "3001:5173" # Внешний порт 3001 -> Внутренний 5173
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - sibsiu-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  sibsiu-network:
    driver: bridge