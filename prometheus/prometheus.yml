# Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sibsiu-canteen'
    environment: 'production'

# Alert manager (optional - for alerts)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Scrape configs
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter for system metrics (if running)
  - job_name: 'node'
    static_configs:
      - targets: []

  # Application metrics - add your app endpoint here
  - job_name: 'sibsiu-app'
    static_configs:
      - targets: ['app:5173']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Keycloak metrics
  - job_name: 'keycloak'
    static_configs:
      - targets: ['keycloak:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL exporter (if running)
  - job_name: 'postgres'
    static_configs:
      - targets: []