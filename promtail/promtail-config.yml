# Promtail configuration
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_targets:
      - "sibsiu-*"
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container

  # Application logs
  - job_name: app-logs
    static_configs:
      - targets:
          - localhost
    labels:
      job: app

  # System logs (if available)
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system

  # JSON logs from app container
  - job_name: app-json
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            time: time
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-json